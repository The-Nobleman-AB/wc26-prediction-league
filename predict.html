<!DOCTYPE html>
<html>

<head>

    <title>Submit Predictions</title>

    <link rel="stylesheet"
          href="css/style.css">

</head>

<body>

<header>

    <h1>⚽ WC26 Prediction Portal</h1>

    <p>
        Enter your predictions before kickoff.
    </p>

</header>

<div class="container">

    <!-- LOGIN -->

    <div class="card">

        <h2>Player Login</h2>

        <input
            type="text"
            id="playerName"
            placeholder="Player Name">

        <input
            type="password"
            id="playerPassword"
            placeholder="Password">

        <button onclick="login()">
            Login
        </button>

    </div>

    <!-- PLAYER INFO -->

    <div
        id="playerInfo"
        class="card"
        style="display:none;">

    </div>

    <!-- FIXTURES -->

    <div
        id="fixturesContainer"
        style="display:none;">

    </div>

</div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/predict.js"></script>

</body>

</html>
